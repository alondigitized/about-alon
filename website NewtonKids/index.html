<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Newton Kids - Learn Physics with Canvas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Newton Kids: Learn Physics with Canvas</h1>
    <nav>
      <button data-chapter="chapter1">Chapter 1</button>
      <button data-chapter="chapter2">Chapter 2</button>
      <button data-chapter="chapter3">Chapter 3</button>
    </nav>
  </header>
  <main id="app">
    <section id="chapter1" class="chapter" hidden>
      <canvas id="c1" width="800" height="420" aria-label="Chapter 1 canvas"></canvas>
      <div class="legend">Move a ball with velocity; observe position over time.</div>
    </section>
    <section id="chapter2" class="chapter" hidden>
      <canvas id="c2" width="800" height="420" aria-label="Chapter 2 canvas"></canvas>
      <div class="legend">Adjust gravity and watch free-fall or projectile motion.</div>
    </section>
    <section id="chapter3" class="chapter" hidden>
      <canvas id="c3" width="800" height="420" aria-label="Chapter 3 canvas"></canvas>
      <div class="legend">Apply forces, impulse, and observe simple collisions.</div>
    </section>
  </main>
  <script src="src/main.js" defer></script>
</body>
</html>
