<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefs</title>
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #151515;
      --border: #262626;
      --text: #d4d4d4;
      --text-muted: #737373;
      --accent-ai: #3b82f6;
      --accent-retail: #f59e0b;
      --mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 16px 64px;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 40px;
    }
    a { text-decoration: none; }
    .card {
      display: block;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .card:hover { text-decoration: none; }
    .card.ai { border-left: 3px solid var(--accent-ai); }
    .card.ai:hover { border-color: var(--accent-ai); }
    .card.retail { border-left: 3px solid var(--accent-retail); }
    .card.retail:hover { border-color: var(--accent-retail); }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .footer {
      margin-top: 48px;
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.5;
    }
    @media (max-width: 480px) {
      html { font-size: 14px; }
      body { padding: 48px 12px; }
    }
  </style>
</head>
<body>

  <h1>Briefs</h1>
  <div class="sub">Daily intelligence, curated by AI</div>

  <a href="ai-brief/index.html" class="card ai">
    <div class="card-title">AI Brief</div>
    <div class="card-desc">Enterprise strategy + founder/operator edge. Weekdays at 5 AM PT.</div>
  </a>

  <a href="research/index.html" class="card retail">
    <div class="card-title">Retail Intelligence Pulse</div>
    <div class="card-desc">Footwear, digital commerce, marketplaces, loyalty, omnichannel. Daily at 4 AM PT.</div>
  </a>

  <div class="footer">Passcode-gated. Content is AI-curated.</div>

</body>
</html>
